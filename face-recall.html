<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Recall — MindBloom</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #EAF3DE; color: #1a1a1a;
      line-height: 1.6;
    }
    header {
      background: #173404; padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo, .back-btn { color: white; text-decoration: none; font-weight: bold; }
    .logo { font-family: 'Fredoka One', cursive; font-size: 1.2rem; }
    
    main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-family: 'Fredoka One', cursive; color: #173404; margin-bottom: 0.5rem; text-align: center; }
    .subtitle { text-align: center; margin-bottom: 2rem; color: #4a5568; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem; margin-bottom: 2rem;
    }
    .card {
      background: white; border: 2px solid #97C459;
      padding: 1rem; text-align: center;
    }
    .card img {
      width: 120px; height: 120px; border-radius: 50%;
      object-fit: cover; margin-bottom: 1rem;
      border: 3px solid #639922;
    }
    .card h3 { color: #173404; margin-bottom: 0.2rem; }
    .card .role { font-weight: bold; font-size: 0.9rem; color: #3B6D11; }
    .card .fact { font-size: 0.85rem; color: #4a5568; margin-top: 0.5rem; }
    
    .btn {
      display: block; width: 200px; margin: 0 auto;
      background: #3B6D11; color: white; border: none;
      padding: 12px; font-size: 1rem; font-weight: bold; cursor: pointer;
    }
    .btn:hover { background: #173404; }

    select {
      width: 100%; padding: 8px; margin-top: 1rem;
      border: 1px solid #3B6D11; font-family: 'Nunito', sans-serif;
    }
    .result-msg { margin-top: 0.5rem; font-weight: bold; font-size: 0.9rem; }
    .correct { color: #3B6D11; }
    .incorrect { color: #D85A30; }

    #quiz-section, #results-section { display: none; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">🌱 MindBloom</a>
    <a href="index.html" class="back-btn">← Back</a>
  </header>

  <main>
    <h1>Face Recall</h1>
    <p class="subtitle" id="page-desc">Study the faces, names, and facts below. Take your time!</p>

    <div id="study-section">
      <div class="grid" id="study-grid"></div>
      <button class="btn" onclick="startQuiz()">I'm Ready - Start Quiz</button>
    </div>

    <div id="quiz-section">
      <div class="grid" id="quiz-grid"></div>
      <button class="btn" onclick="submitQuiz()" id="submit-btn">Submit Answers</button>
    </div>

    <div id="results-section" style="text-align: center; margin-top: 2rem;">
      <h2 id="final-score"></h2>
      <button class="btn" onclick="location.reload()" style="margin-top: 1rem;">Try Again</button>
    </div>
  </main>

  <script>
    const PEOPLE = [
      { name: 'John Smith',    role: 'Community Gardener', img: 'https://www.shutterstock.com/image-photo/cheerful-handsome-young-african-american-600nw-2566358183.jpg',  fact: 'Grows herbs and vegetables' },
      { name: 'Xiao Zhan',  role: 'Actor',     img: 'https://i.scdn.co/image/ab6761610000e5eb44aeecc6eb7289663d46e21f', fact: 'Loves photography' },
      { name: 'Sofia Grant',   role: 'Local Doctor',       img: 'https://t4.ftcdn.net/jpg/03/83/25/83/360_F_383258331_D8imaEMl8Q3lf7EKU2Pi78Cn0R7KkW9o.jpg',  fact: 'Family medicine for 5 years' },
      { name: 'James Smith',    role: 'Library Volunteer',  img: 'https://preview.redd.it/im-looking-for-more-stock-photos-of-this-guy-with-different-v0-cjiwwbj1eu9f1.jpeg?auto=webp&s=93e92b6c2d805a45d93a7bc994273864790b2923', fact: 'Reads to children on Saturdays' },
      { name: 'Sonia Matthews',   role: 'Neighborhood Chef',  img: 'https://t4.ftcdn.net/jpg/04/80/05/77/360_F_480057743_J7wTBWRW3vABPnqEv2IwSVVXjj50xevN.jpg', fact: 'Award-winning carrot cake' },
      { name: 'Carlos Mendez', role: 'Park Ranger',        img: 'https://t3.ftcdn.net/jpg/06/20/79/64/360_F_620796488_9b3fBDnhkqYmaJhCJZOu1h9QvRRoxfJM.jpg', fact: 'Protects the nature reserve' }
    ];

    function initStudy() {
      const grid = document.getElementById('study-grid');
      PEOPLE.forEach(p => {
        grid.innerHTML += `
          <div class="card">
            <img src="${p.img}" alt="Photo of ${p.name}">
            <h3>${p.name}</h3>
            <div class="role">${p.role}</div>
            <div class="fact">${p.fact}</div>
          </div>
        `;
      });
    }

    function startQuiz() {
      document.getElementById('study-section').style.display = 'none';
      document.getElementById('quiz-section').style.display = 'block';
      document.getElementById('page-desc').innerText = 'Select the correct name for each person.';

      const grid = document.getElementById('quiz-grid');
      const shuffledPeople = [...PEOPLE].sort(() => Math.random() - 0.5);
      const allNames = [...PEOPLE].map(p => p.name).sort();

      let optionsHTML = `<option value="">-- Select a Name --</option>`;
      allNames.forEach(name => { optionsHTML += `<option value="${name}">${name}</option>`; });

      shuffledPeople.forEach((p, index) => {
        grid.innerHTML += `
          <div class="card" id="card-${index}">
            <img src="${p.img}" alt="Unknown person">
            <div class="role">${p.role}</div>
            <div class="fact">${p.fact}</div>
            <select id="select-${index}" data-correct="${p.name}">
              ${optionsHTML}
            </select>
            <div class="result-msg" id="msg-${index}"></div>
          </div>
        `;
      });
    }

    function submitQuiz() {
      document.getElementById('submit-btn').style.display = 'none';
      let correctCount = 0;

      const selects = document.querySelectorAll('select');
      selects.forEach((sel, index) => {
        sel.disabled = true;
        const msg = document.getElementById(`msg-${index}`);
        if (sel.value === sel.getAttribute('data-correct')) {
          correctCount++;
          msg.innerText = "Correct!";
          msg.className = "result-msg correct";
        } else {
          msg.innerText = `Incorrect. It's ${sel.getAttribute('data-correct')}`;
          msg.className = "result-msg incorrect";
        }
      });

      document.getElementById('results-section').style.display = 'block';
      document.getElementById('final-score').innerText = `You got ${correctCount} out of ${PEOPLE.length} correct!`;
    }

    initStudy();
  </script>
</body>
</html>
