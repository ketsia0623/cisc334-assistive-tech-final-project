<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Match — MindBloom</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #EAF3DE; color: #1a1a1a; }
    
    header { background: #173404; padding: 1rem 2rem; display: flex; justify-content: space-between; }
    .logo, .back-btn { color: white; text-decoration: none; font-weight: bold; }
    
    main { max-width: 600px; margin: 2rem auto; padding: 0 1rem; text-align: center; }
    h1 { font-family: 'Fredoka One', cursive; color: #173404; }
    .stats { margin: 1rem 0; font-weight: bold; }
    
    .card-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 2rem;
    }
    .mem-card {
      aspect-ratio: 1; border: none; background: transparent; cursor: pointer; perspective: 600px;
    }
    .card-inner {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d; transition: transform 0.3s;
    }
    .mem-card.flipped .card-inner, .mem-card.matched .card-inner { transform: rotateY(180deg); }
    .card-front, .card-back {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      backface-visibility: hidden; font-size: 2rem; border: 2px solid #3B6D11; background: white;
    }
    .card-front { background: #97C459; }
    .card-back { transform: rotateY(180deg); }
    .mem-card.matched .card-back { background: #C0DD97; }

    #success-msg { display: none; margin-top: 2rem; font-weight: bold; font-size: 1.2rem; }
    .btn { background: #3B6D11; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-top: 1rem; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">🌱 MindBloom</a>
    <a href="index.html" class="back-btn">← Back</a>
  </header>

  <main>
    <h1>Memory Match</h1>
    <p>Find all the pairs.</p>
    <div class="stats">Moves: <span id="moves">0</span> | Matches: <span id="matches">0</span> / 8</div>
    
    <div class="card-grid" id="grid"></div>
    
    <div id="success-msg">
      <p>You found all pairs!</p>
      <button class="btn" onclick="location.reload()">Play Again</button>
    </div>
  </main>

  <script>
    const EMOJIS = ['🦊','🐬','🦁','🐧','🦋','🐙','🦉','🌺'];
    let flipped = [], matched = 0, moves = 0, locked = false;

    function init() {
      const grid = document.getElementById('grid');
      const cards = [...EMOJIS, ...EMOJIS].sort(() => Math.random() - 0.5);
      
      cards.forEach((emoji) => {
        const btn = document.createElement('button');
        btn.className = 'mem-card';
        btn.dataset.emoji = emoji;
        btn.innerHTML = `<div class="card-inner"><div class="card-front"></div><div class="card-back">${emoji}</div></div>`;
        btn.onclick = () => flipCard(btn);
        grid.appendChild(btn);
      });
    }

    function flipCard(btn) {
      if (locked || btn.classList.contains('flipped') || btn.classList.contains('matched')) return;
      
      btn.classList.add('flipped');
      flipped.push(btn);

      if (flipped.length === 2) {
        locked = true;
        moves++;
        document.getElementById('moves').innerText = moves;

        if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
          flipped.forEach(c => c.classList.add('matched'));
          matched++;
          document.getElementById('matches').innerText = matched;
          flipped = []; locked = false;
          if (matched === 8) document.getElementById('success-msg').style.display = 'block';
        } else {
          setTimeout(() => {
            flipped.forEach(c => c.classList.remove('flipped'));
            flipped = []; locked = false;
          }, 800);
        }
      }
    }
    init();
  </script>
</body>
</html>
