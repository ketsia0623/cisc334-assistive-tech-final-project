<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocab Practice — MindBloom</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #EAF3DE; color: #1a1a1a; line-height: 1.6; }
    header { background: #173404; padding: 1rem 2rem; display: flex; justify-content: space-between; }
    .logo, .back-btn { color: white; text-decoration: none; font-weight: bold; }
    
    main { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-family: 'Fredoka One', cursive; color: #173404; text-align: center; margin-bottom: 2rem; }

    .word-box { background: white; border: 2px solid #97C459; padding: 2rem; text-align: center; margin-bottom: 1rem; }
    .word { font-size: 2.5rem; font-family: 'Fredoka One', cursive; color: #173404; }
    .type { color: #4a5568; font-style: italic; }

    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn {
      background: white; border: 2px solid #3B6D11; padding: 1rem;
      font-size: 1rem; text-align: left; cursor: pointer;
    }
    .choice-btn:hover:not(:disabled) { background: #f0f0f0; }
    .choice-btn.correct { background: #C0DD97; border-color: #3B6D11; }
    .choice-btn.wrong { background: #FAECE7; border-color: #D85A30; }

    .feedback { margin-top: 1rem; padding: 1rem; display: none; font-weight: bold; border: 1px solid #ccc; background: white; }
    .btn { display: none; width: 100%; background: #3B6D11; color: white; border: none; padding: 1rem; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">🌱 MindBloom</a>
    <a href="index.html" class="back-btn">← Back</a>
  </header>

  <main>
    <h1>Vocab Practice</h1>
    <p style="text-align: center;">Question <span id="q-num">1</span> of 10</p>
    
    <div class="word-box">
      <div class="word" id="word">Loading...</div>
      <div class="type" id="type"></div>
    </div>

    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn" id="next-btn" onclick="nextQuestion()">Next Word →</button>
  </main>

  <script>
    const WORDS = [
      { word: 'Verdant', pos: 'adjective', def: 'Lush green with plants and vegetation', wrong: ['Dry and barren', 'Rocky and steep', 'Cold and icy'] },
      { word: 'Ephemeral', pos: 'adjective', def: 'Lasting for a very short time', wrong: ['Lasting forever', 'Growing underground', 'Very loud and harsh'] },
      { word: 'Eloquent', pos: 'adjective', def: 'Fluent and persuasive in speaking or writing', wrong: ['Quiet and reserved', 'Rude and blunt', 'Confused and unclear'] },
      { word: 'Tenacious', pos: 'adjective', def: 'Holding firmly to a goal despite difficulty', wrong: ['Easily giving up', 'Loud and boisterous', 'Quick to change plans'] },
      { word: 'Ponder', pos: 'verb', def: 'To think deeply and carefully about something', wrong: ['To rush without thinking', 'To shout loudly', 'To move very fast'] }
    ];

    let current = 0;

    function loadQuestion() {
      if (current >= WORDS.length) {
        document.querySelector('main').innerHTML = `<h1 style="text-align:center;">All done!</h1><button class="btn" style="display:block;" onclick="location.reload()">Restart</button>`;
        return;
      }
      
      const q = WORDS[current];
      document.getElementById('q-num').innerText = current + 1;
      document.getElementById('word').innerText = q.word;
      document.getElementById('type').innerText = q.pos;
      
      const choicesDiv = document.getElementById('choices');
      choicesDiv.innerHTML = '';
      document.getElementById('feedback').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';

      const options = [q.def, ...q.wrong].sort(() => Math.random() - 0.5);
      
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerText = opt;
        btn.onclick = () => selectAnswer(btn, opt === q.def, q.def);
        choicesDiv.appendChild(btn);
      });
    }

    function selectAnswer(btn, isCorrect, correctText) {
      document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      const fb = document.getElementById('feedback');
      fb.style.display = 'block';

      if (isCorrect) {
        btn.classList.add('correct');
        fb.innerText = "Correct!";
      } else {
        btn.classList.add('wrong');
        fb.innerText = `Incorrect. The correct answer is: ${correctText}`;
      }
      document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
      current++;
      loadQuestion();
    }

    loadQuestion();
  </script>
</body>
</html>
